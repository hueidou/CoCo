version: '3.8'

volumes:
  coco-data:
    name: coco-data
  coco-secrets:
    name: coco-secrets

services:
  coco:
    image: agentscope/coco:latest
    container_name: coco
    restart: always
    ports:
      - "127.0.0.1:8088:8088"
    # environment:
    #   - COCO_AUTH_ENABLED=true
    #   - COCO_AUTH_USERNAME=admin
    #   - COCO_AUTH_PASSWORD=yourpassword
    volumes:
      - coco-data:/app/working
      - coco-secrets:/app/working.secret
